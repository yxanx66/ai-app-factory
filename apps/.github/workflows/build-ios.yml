name: Build iOS App
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Build HVAC Duct Calculator
        run: |
          cd ios/HVACDuctCalculator
          xcodebuild -project HVACDuctCalculator.xcodeproj \
            -scheme HVACDuctCalculator \
            -sdk iphoneos \
            -configuration Release \
            -archivePath $PWD/build/HVACDuctCalculator.xcarchive \
            archive
      
      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath ios/HVACDuctCalculator/build/HVACDuctCalculator.xcarchive \
            -exportPath build/ \
            -exportOptionsPlist ExportOptions.plist
      
      - name: Upload to App Store Connect
        uses: apple-actions/upload-testflight-build@v1
        with:
          app-path: build/HVACDuctCalculator.ipa
          issuer-id: ${{ secrets.APPSTORE_ISSUER_ID }}
          api-key-id: ${{ secrets.APPSTORE_KEY_ID }}
          api-private-key: ${{ secrets.APPSTORE_PRIVATE_KEY }}
