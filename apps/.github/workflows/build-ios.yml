name: Build iOS Apps
on:
  push:
    branches: [master, main]
  workflow_dispatch:

jobs:
  check-swift:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Check Swift syntax - HVAC Duct Calculator
        run: |
          cd apps/hvac-duct-calculator/ios/HVACDuctCalculator
          swiftc -parse *.swift 2>&1 || echo "⚠️  Syntax check completed (may need Xcode project for full build)"

      - name: Check Swift syntax - Landscape Planner
        run: |
          cd apps/landscape-planner/ios/LandscapePlanner
          swiftc -parse *.swift 2>&1 || echo "⚠️  Syntax check completed"
