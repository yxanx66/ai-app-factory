name: Build & Deploy to App Store
on:
  push:
    branches: [master, main]
    paths:
      - 'apps/hvac-duct-calculator/**'
  workflow_dispatch:

jobs:
  hvac-duct-calculator:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Ruby & Fastlane
        run: |
          gem install fastlane -NV

      - name: Create Xcode project
        run: |
          cd apps/hvac-duct-calculator/ios
          cat > project.yml << 'YML'
          name: HVACDuctCalculator
          options:
            bundleIdPrefix: com.ai-app-factory
            deploymentTarget:
              iOS: "16.0"
          targets:
            HVACDuctCalculator:
              type: application
              platform: iOS
              sources: [HVACDuctCalculator]
              settings:
                base:
                  INFOPLIST_FILE: HVACDuctCalculator/Info.plist
                  PRODUCT_BUNDLE_IDENTIFIER: com.ai-app-factory.hvacductcalculator
                  MARKETING_VERSION: "1.0"
                  CURRENT_PROJECT_VERSION: "1"
          YML
          brew install xcodegen
          xcodegen generate

      - name: Create Info.plist
        run: |
          cat > apps/hvac-duct-calculator/ios/HVACDuctCalculator/Info.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleName</key>
              <string>HVAC Duct Calculator</string>
              <key>CFBundleDisplayName</key>
              <string>Duct Calculator</string>
              <key>CFBundleIdentifier</key>
              <string>com.ai-app-factory.hvacductcalculator</string>
              <key>CFBundleVersion</key>
              <string>1</string>
              <key>CFBundleShortVersionString</key>
              <string>1.0</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>LSRequiresIPhoneOS</key>
              <true/>
              <key>UILaunchScreen</key>
              <dict/>
              <key>UISupportedInterfaceOrientations</key>
              <array>
                  <string>UIInterfaceOrientationPortrait</string>
              </array>
              <key>UIRequiredDeviceCapabilities</key>
              <array>
                  <string>armv7</string>
              </array>
          </dict>
          </plist>
          PLIST

      - name: Decode API Key
        run: |
          mkdir -p ~/.appstoreconnect
          echo "${{ secrets.APPSTORE_API_KEY_BASE64 }}" | base64 -d > ~/.appstoreconnect/api_key.p8

      - name: Build & Upload with Fastlane
        run: |
          cd apps/hvac-duct-calculator/ios
          fastlane run cert \
            api_key_path:"$HOME/.appstoreconnect/api_key.p8" \
            api_key_issuer_id:"${{ secrets.APPSTORE_ISSUER_ID }}" \
            api_key_key_id:"${{ secrets.APPSTORE_KEY_ID }}" \
            development:false

          fastlane run sigh \
            api_key_path:"$HOME/.appstoreconnect/api_key.p8" \
            api_key_issuer_id:"${{ secrets.APPSTORE_ISSUER_ID }}" \
            api_key_key_id:"${{ secrets.APPSTORE_KEY_ID }}" \
            app_identifier:"com.ai-app-factory.hvacductcalculator" \
            development:false

          fastlane run build_app \
            project:HVACDuctCalculator.xcodeproj \
            scheme:HVACDuctCalculator \
            export_method:app-store \
            skip_profile_detection:true \
            skip_package_ipa:false \
            output_directory:./build

          fastlane run upload_to_app_store \
            api_key_path:"$HOME/.appstoreconnect/api_key.p8" \
            api_key_issuer_id:"${{ secrets.APPSTORE_ISSUER_ID }}" \
            api_key_key_id:"${{ secrets.APPSTORE_KEY_ID }}" \
            app_identifier:"com.ai-app-factory.hvacductcalculator" \
            ipa:"./build/HVACDuctCalculator.ipa" \
            app_version:"1.0" \
            submit_for_review:false \
            skip_metadata:true \
            skip_screenshots:true

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: HVACDuctCalculator-signed.ipa
          path: apps/hvac-duct-calculator/ios/build/HVACDuctCalculator.ipa
